<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sermon Slides Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #333346;
            --card: #24242b;
            --card-raised: #1C1C22;
            --input-bg: #111115;
            --border: #2C2C35;
            --border-focus: #E8C46C;
            --text: #F2EFE8;
            --text-dim: #A09A90;
            --text-faint: #5C584F;
            --accent: #E8C46C;
            --accent-dim: rgba(232, 196, 108, 0.08);
            --accent-glow: rgba(232, 196, 108, 0.2);
            --cta: #5c86c4;
            --cta-hover: #6aacd0;
            --cta-glow: rgb(92 149 196 / 0.35);
            --success-bg: rgba(92, 180, 92, 0.1);
            --success: #7CC47C;
            --success-border: #4C9C4C;
            --error-bg: rgba(196, 92, 92, 0.1);
            --error: #D49090;
            --error-border: #C45C5C;
            --warn-bg: rgba(210, 170, 60, 0.1);
            --warn: #D4C080;
            --warn-border: #B49C40;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px;
            position: relative;
        }

        /* Ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(232, 196, 108, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 520px;
            overflow: hidden;
            animation: enter 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes enter {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top accent bar */
        .accent-bar {
            height: 3px;
            background: linear-gradient(90deg, var(--cta), var(--accent));
        }

        .card-header {
            padding: 36px 36px 0;
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 5px 14px;
            background: var(--accent-dim);
            border: 1px solid rgba(232, 196, 108, 0.15);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeUp 0.4s 0.2s ease forwards;
        }

        h1 {
            font-family: 'DM Serif Display', Georgia, serif;
            color: var(--text);
            font-size: 32px;
            font-weight: 400;
            line-height: 1.15;
            letter-spacing: -0.01em;
            opacity: 0;
            animation: fadeUp 0.4s 0.1s ease forwards;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 15px;
            font-weight: 400;
            margin-top: 8px;
            opacity: 0;
            animation: fadeUp 0.4s 0.2s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            height: 1px;
            margin: 28px 36px 0;
            background: var(--border);
        }

        .card-body {
            padding: 28px 36px 36px;
        }

        .form-group {
            margin-bottom: 22px;
            opacity: 0;
            animation: fadeUp 0.4s ease forwards;
        }
        .form-group:nth-child(1) { animation-delay: 0.25s; }
        .form-group:nth-child(2) { animation-delay: 0.3s; }
        .form-group:nth-child(3) { animation-delay: 0.35s; }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.01em;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background: var(--input-bg);
            transition: all 0.2s ease;
            line-height: 1.5;
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: var(--text-faint);
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-dim), 0 0 24px rgba(232, 196, 108, 0.06);
        }

        textarea {
            min-height: 170px;
            resize: vertical;
        }

        .file-selector {
            display: flex;
            gap: 8px;
        }

        .file-path {
            flex: 1;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.5;
        }

        .btn {
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary {
            padding: 14px 20px;
            background: var(--card-raised);
            color: var(--text-dim);
            font-size: 13px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            color: var(--text);
        }

        .btn-secondary:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .btn-generate {
            width: 100%;
            margin-top: 8px;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.02em;
            background: var(--cta);
            color: #fff;
            border-radius: 10px;
            opacity: 0;
            animation: fadeUp 0.4s 0.4s ease forwards;
        }

        .btn-generate:hover {
            background: var(--cta-hover);
            box-shadow: 0 6px 28px var(--cta-glow);
            transform: translateY(-1px);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .help-text {
            font-size: 13px;
            color: var(--text-faint);
            margin-top: 6px;
            line-height: 1.4;
        }

        /* Progress */
        .progress-container {
            display: none;
            margin-top: 24px;
            padding: 20px;
            background: var(--input-bg);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .progress-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cta), var(--accent));
            border-radius: 4px;
            transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            width: 0%;
        }

        .progress-text {
            margin-top: 10px;
            text-align: right;
            color: var(--text-dim);
            font-size: 13px;
        }

        /* Messages */
        .message {
            padding: 14px 16px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            border-left: 3px solid transparent;
            animation: msgIn 0.3s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            background: var(--success-bg);
            color: var(--success);
            border-left-color: var(--success-border);
        }

        .message.error {
            background: var(--error-bg);
            color: var(--error);
            border-left-color: var(--error-border);
        }

        .message.warning {
            background: var(--warn-bg);
            color: var(--warn);
            border-left-color: var(--warn-border);
        }

        .card-footer {
            padding: 14px 36px;
            text-align: center;
            border-top: 1px solid var(--border);
        }

        .card-footer span {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-faint);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Scrollbar */
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        @media (max-width: 480px) {
            body { padding: 16px; }
            .card-header { padding: 28px 24px 0; }
            .card-body { padding: 24px 24px 28px; }
            .card-footer { padding: 12px 24px; }
            .divider { margin: 24px 24px 0; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="container">
<!--        <div class="accent-bar"></div>-->

        <div class="card-header">
<!--            <div class="badge">PDF Generator</div>-->
            <h1>Sermon Slides</h1>
            <p class="subtitle">Create slides from Scripture passages</p>
        </div>

        <div class="divider"></div>

        <div class="card-body">
            <form id="slideForm">
                <div class="form-group">
                    <label for="title">Sermon Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter your sermon title" required>
                </div>

                <div class="form-group">
                    <label for="passages">Bible Passages</label>
                    <textarea id="passages" name="passages" placeholder="One passage per line&#10;&#10;John 3:16&#10;Psalm 23:1-6&#10;Genesis 1:1-5&#10;Matthew 5:1-12" required></textarea>
                    <div class="help-text">One reference per line, e.g. "John 3:16" or "Psalm 23"</div>
                </div>

                <div class="form-group">
                    <label for="saveLocation">Save Location</label>
                    <div class="file-selector">
                        <div class="file-path" id="saveLocation">Select folder...</div>
                        <button type="button" class="btn btn-secondary" onclick="selectFolder()">Browse</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-generate" id="generateBtn">
                    Generate PDF Slides
                </button>
            </form>

            <div class="progress-container" id="progressContainer">
                <div class="progress-label">Generating</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Starting...</div>
            </div>

            <div class="message" id="message"></div>
        </div>

<!--        <div class="card-footer">-->
<!--            <span>CSB Sermon Slides</span>-->
<!--        </div>-->
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const location = await pywebview.api.get_default_location();
                document.getElementById('saveLocation').textContent = location;
            } catch (error) {
                console.error('Failed to get default location:', error);
            }
        });

        async function selectFolder() {
            try {
                const result = await pywebview.api.select_save_location();
                if (result.success) {
                    document.getElementById('saveLocation').textContent = result.location;
                }
            } catch (error) {
                showMessage('Error selecting folder: ' + error, 'error');
            }
        }

        document.getElementById('slideForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const passages = document.getElementById('passages').value.trim();
            const saveLocation = document.getElementById('saveLocation').textContent;

            if (!title || !passages) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            if (saveLocation === 'Select folder...') {
                showMessage('Please select a save location', 'error');
                return;
            }

            setFormEnabled(false);
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('message').style.display = 'none';

            try {
                const result = await pywebview.api.generate_pdf(title, passages, saveLocation);
                if (!result.success) {
                    showMessage(result.message, 'error');
                    setFormEnabled(true);
                }
            } catch (error) {
                showMessage('Error: ' + error, 'error');
                setFormEnabled(true);
            }
        });

        window.updateProgress = function(percent, message) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = message;
        };

        window.onGenerationSuccess = function(filePath, slideCount) {
            document.getElementById('progressContainer').style.display = 'none';
            showMessage(`Created ${slideCount} slides \u2014 ${filePath}`, 'success');
            setFormEnabled(true);
        };

        window.onGenerationError = function(message) {
            document.getElementById('progressContainer').style.display = 'none';
            showMessage('Error: ' + message, 'error');
            setFormEnabled(true);
        };

        window.onGenerationWarning = function(message) {
            showMessage('Warning: ' + message, 'warning');
        };

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
        }

        function setFormEnabled(enabled) {
            document.getElementById('title').disabled = !enabled;
            document.getElementById('passages').disabled = !enabled;
            document.getElementById('generateBtn').disabled = !enabled;
            document.querySelector('.btn-secondary').disabled = !enabled;
        }
    </script>
</body>
</html>

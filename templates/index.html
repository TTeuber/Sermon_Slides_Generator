<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sermon Slides Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 200px;
            resize: vertical;
        }
        
        .file-selector {
            display: flex;
            gap: 10px;
        }
        
        .file-path {
            flex: 1;
            padding: 12px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }
        
        .btn-secondary:hover {
            background: #d5dbdd;
        }
        
        .btn-generate {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            font-size: 16px;
        }
        
        .progress-container {
            display: none;
            margin-top: 30px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }
        
        .progress-text {
            margin-top: 10px;
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        
        .help-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✝️ Sermon Slides Generator</h1>
        
        <form id="slideForm">
            <div class="form-group">
                <label for="title">Sermon Title</label>
                <input type="text" id="title" name="title" placeholder="Enter sermon title (will be used as filename)" required>
            </div>
            
            <div class="form-group">
                <label for="passages">Bible Passages</label>
                <textarea id="passages" name="passages" placeholder="Enter Bible passages, one per line&#10;&#10;Examples:&#10;John 3:16&#10;Psalm 23&#10;Genesis 1:1-5&#10;Matthew 5:1-12" required></textarea>
                <div class="help-text">Enter one passage reference per line (e.g., "John 3:16" or "Psalm 23")</div>
            </div>
            
            <div class="form-group">
                <label for="saveLocation">Save Location</label>
                <div class="file-selector">
                    <div class="file-path" id="saveLocation">Select folder...</div>
                    <button type="button" class="btn btn-secondary" onclick="selectFolder()">Browse</button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-generate" id="generateBtn">
                Generate PDF Slides
            </button>
        </form>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Starting...</div>
        </div>
        
        <div class="message" id="message"></div>
        
        <div class="loading-spinner" id="loadingSpinner"></div>
    </div>
    
    <script>
        // Initialize with default save location
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const location = await pywebview.api.get_default_location();
                document.getElementById('saveLocation').textContent = location;
            } catch (error) {
                console.error('Failed to get default location:', error);
            }
        });
        
        // Select folder function
        async function selectFolder() {
            try {
                const result = await pywebview.api.select_save_location();
                if (result.success) {
                    document.getElementById('saveLocation').textContent = result.location;
                }
            } catch (error) {
                showMessage('Error selecting folder: ' + error, 'error');
            }
        }
        
        // Form submission
        document.getElementById('slideForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value.trim();
            const passages = document.getElementById('passages').value.trim();
            const saveLocation = document.getElementById('saveLocation').textContent;
            
            if (!title || !passages) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }
            
            if (saveLocation === 'Select folder...') {
                showMessage('Please select a save location', 'error');
                return;
            }
            
            // Disable form during generation
            setFormEnabled(false);
            
            // Show progress
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('message').style.display = 'none';
            
            try {
                const result = await pywebview.api.generate_pdf(title, passages, saveLocation);
                if (!result.success) {
                    showMessage(result.message, 'error');
                    setFormEnabled(true);
                }
            } catch (error) {
                showMessage('Error: ' + error, 'error');
                setFormEnabled(true);
            }
        });
        
        // Progress update function
        window.updateProgress = function(percent, message) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = message;
        };
        
        // Success callback
        window.onGenerationSuccess = function(filePath, slideCount) {
            document.getElementById('progressContainer').style.display = 'none';
            showMessage(`Success! Created ${slideCount} slides at: ${filePath}`, 'success');
            setFormEnabled(true);
        };
        
        // Error callback
        window.onGenerationError = function(message) {
            document.getElementById('progressContainer').style.display = 'none';
            showMessage('Error: ' + message, 'error');
            setFormEnabled(true);
        };
        
        // Warning callback
        window.onGenerationWarning = function(message) {
            showMessage('Warning: ' + message, 'warning');
        };
        
        // Show message function
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
        }
        
        // Enable/disable form
        function setFormEnabled(enabled) {
            document.getElementById('title').disabled = !enabled;
            document.getElementById('passages').disabled = !enabled;
            document.getElementById('generateBtn').disabled = !enabled;
            document.querySelector('.btn-secondary').disabled = !enabled;
        }
    </script>
</body>
</html>

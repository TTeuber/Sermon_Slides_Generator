        <span id="en-CSB-14237" class="text Ps-23-1"><sup class="versenum">1 </sup>The Lord is my shepherd;<br>I have what I need.</span><br>
        <span id="en-CSB-14238" class="text Ps-23-2"><sup class="versenum">2 </sup>He lets me lie down in green pastures;<br>he leads me beside quiet waters.</span><br>
        <span id="en-CSB-14239" class="text Ps-23-3"><sup class="versenum">3 </sup>He renews my life;<sup data-fn="#fen-CSB-14239a" class="footnote">[<a href="#fen-CSB-14239a" title="See footnote a">a</a>]</sup><br>he leads me along the right paths<br>for his name&rsquo;s sake.</span>
